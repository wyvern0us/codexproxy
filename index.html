<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>‎</title> <!-- Invisible Title -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --bg-dark: #050505;
            --bg-panel: #0a0a0a;
            --bg-sidebar: #000000;
            --border: #222;
            --text-main: #fff;
            --text-muted: #888;
            --accent: #fff;
        }

        body { background: var(--bg-dark); color: var(--text-main); overflow: hidden; height: 100vh; width: 100vw; }

        /* --- FAKE ERROR PAGE (STEALTH) --- */
        #fake-error-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #202124; z-index: 999999;
            display: flex; flex-direction: column; align-items: center; padding-top: 10vh;
            font-family: 'Segoe UI', Tahoma, sans-serif; transition: opacity 0.2s;
        }
        .err-content { max-width: 600px; width: 100%; padding: 0 20px; }
        .err-icon { color: #5f6368; font-size: 48px; margin-bottom: 20px; }
        .err-title { font-size: 24px; font-weight: 500; margin-bottom: 10px; }
        .err-msg { font-size: 15px; color: #5f6368; line-height: 1.6; margin-bottom: 25px; }
        .err-code { font-size: 12px; color: #5f6368; font-family: monospace; margin-top: 20px; }
        .err-btn { background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 500; cursor: pointer; }
        .err-details-box { display: none; margin-top: 20px; border-top: 1px solid #dadce0; padding-top: 10px; width: 100%; }
        #unlock-input { 
            width: 100%; padding: 10px; border: 1px solid #dadce0; 
            border-radius: 4px; outline: none; font-family: monospace; margin-top: 10px;
        }

        /* --- APP UI --- */
        .app-container { display: flex; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        
        /* Sidebar */
        .sidebar {
            width: 70px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }
        .nav-item {
            width: 44px; height: 44px; margin-bottom: 15px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; transition: 0.2s; font-size: 24px;
        }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: var(--text-main); }

        /* Main Content */
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .page { display: none; width: 100%; height: 100%; animation: fade 0.3s; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Dashboard */
        .home-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .clock { font-size: 90px; font-weight: 800; letter-spacing: -3px; line-height: 1; margin-bottom: 10px; }
        .date { font-size: 16px; color: var(--text-muted); margin-bottom: 30px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }
        .status-row { display: flex; gap: 20px; background: #111; padding: 10px 25px; border-radius: 50px; border: 1px solid #222; }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #ccc; }
        .status-item i { font-size: 18px; color: #fff; }

        /* Games Grid */
        .games-wrapper { padding: 30px; overflow-y: auto; flex: 1; }
        .games-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-container { position: relative; }
        .search-container i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #666; }
        .search-input { background: #111; border: 1px solid #222; color: white; padding: 10px 10px 10px 35px; border-radius: 8px; outline: none; width: 250px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .game-card {
            background: #0f0f0f; border: 1px solid #222; border-radius: 8px; padding: 25px;
            text-align: center; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; color: #ddd;
        }
        .game-card:hover { border-color: #444; background: #161616; transform: translateY(-3px); color: white; }

        /* Browser System */
        .browser-layout { display: flex; flex-direction: column; height: 100%; background: #fff; }
        .tabs-header { 
            display: flex; align-items: center; background: #000; 
            padding: 8px 10px 0 10px; gap: 5px; border-bottom: 1px solid #222; 
        }
        .tab {
            background: #111; color: #888; padding: 8px 15px; border-radius: 8px 8px 0 0;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
            max-width: 160px; border: 1px solid transparent; border-bottom: none; user-select: none;
        }
        .tab i { font-size: 14px; }
        .tab.active { background: #222; color: white; border-color: #333; }
        .tab-close { font-size: 16px; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .tab-close:hover { background: #444; color: #fff; }
        .new-tab { color: #888; padding: 5px 10px; cursor: pointer; font-size: 20px; display: flex; align-items: center; }
        .new-tab:hover { color: #fff; }

        .url-bar { 
            display: flex; gap: 10px; background: #0a0a0a; padding: 10px; border-bottom: 1px solid #222; align-items: center; position: relative;
        }
        /* Loader Line */
        .loader-line {
            position: absolute; bottom: -1px; left: 0; height: 2px; background: #fff; 
            width: 0%; transition: width 0.2s, opacity 0.2s; z-index: 10;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .loader-line.loading { width: 90%; transition: width 8s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        .loader-line.finished { width: 100%; opacity: 0; transition: width 0.2s, opacity 0.5s; }

        .nav-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 20px; padding: 5px; display: flex; align-items: center; }
        .nav-btn:hover { color: #fff; background: #222; border-radius: 6px; }
        .url-input { 
            flex: 1; background: #161616; border: 1px solid #333; color: white; 
            padding: 10px 15px; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.2s;
        }
        .url-input:focus { border-color: #555; }
        
        .web-view { flex: 1; position: relative; background: #111; }
        .frame { width: 100%; height: 100%; border: none; display: none; background: white; }
        .frame.active { display: block; }

        /* Loading Overlay */
        .processing-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: #000; color: white; display: none; 
            align-items: center; justify-content: center; flex-direction: column; z-index: 50;
        }
        .processing-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Settings */
        .settings-wrapper { padding: 40px; display: flex; justify-content: center; overflow-y: auto; }
        .settings-box { width: 100%; max-width: 500px; background: #0f0f0f; padding: 30px; border-radius: 12px; border: 1px solid #222; }
        .setting-group { margin-bottom: 25px; }
        .setting-label { display: flex; justify-content: space-between; margin-bottom: 10px; color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .setting-select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        .action-btn { width: 100%; padding: 12px; background: white; color: black; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(20px); background-color: black; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <!-- FAKE ERROR PAGE -->
    <div id="fake-error-page">
        <div class="err-content">
            <i class='bx bxs-error-circle err-icon'></i>
            <div class="err-title">This site can't be reached</div>
            <div class="err-msg">The connection was reset.<br><br>Try:<br>• Checking the connection<br>• Checking the proxy and the firewall</div>
            <div class="err-code">ERR_CONNECTION_REFUSED</div>
            <button class="err-btn" onclick="toggleDetails()">Details</button>
            <div class="err-details-box" id="err-details">
                <p style="font-size:12px; color:#555; margin-bottom:5px;">System Diagnostics:</p>
                <input type="text" id="unlock-input" placeholder="Enter Diagnostic Code..." onkeyup="checkUnlock(event)">
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="nav-item active" onclick="setView('home')" title="Dashboard">
                <i class='bx bxs-dashboard'></i>
            </div>
            <div class="nav-item" onclick="setView('games')" title="Library">
                <i class='bx bxs-game'></i>
            </div>
            <div class="nav-item" onclick="setView('browser')" title="Internet">
                <i class='bx bx-globe'></i>
            </div>
            <div style="flex:1"></div>
            <div class="nav-item" onclick="setView('settings')" title="Settings">
                <i class='bx bxs-cog'></i>
            </div>
        </div>

        <!-- Content -->
        <div class="main-view">
            
            <!-- HOME -->
            <div id="page-home" class="page active">
                <div class="home-center">
                    <div class="clock" id="clock-display">00:00</div>
                    <div class="date" id="date-display">...</div>
                    <div class="status-row">
                        <div class="status-item">
                            <i class='bx bx-time-five'></i>
                            <span>Time</span>
                        </div>
                        <div class="status-item">
                            <i class='bx bxs-battery-charging'></i>
                            <span id="battery-stat">--%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GAMES -->
            <div id="page-games" class="page">
                <div class="games-wrapper">
                    <div class="games-header">
                        <h2>Library</h2>
                        <div class="search-container">
                            <i class='bx bx-search'></i>
                            <input type="text" class="search-input" placeholder="Search 250+ Games..." oninput="filterGames(this.value)">
                        </div>
                    </div>
                    <div class="grid" id="games-grid"></div>
                </div>
            </div>

            <!-- BROWSER -->
            <div id="page-browser" class="page" style="padding:0">
                <div class="browser-layout">
                    <div class="tabs-header" id="tabs-container">
                        <div class="new-tab" onclick="newTab()"><i class='bx bx-plus'></i></div>
                    </div>
                    <div class="url-bar">
                        <button class="nav-btn" onclick="navBack()"><i class='bx bx-left-arrow-alt'></i></button>
                        <button class="nav-btn" onclick="navReload()"><i class='bx bx-refresh'></i></button>
                        <button class="nav-btn" onclick="navForward()"><i class='bx bx-right-arrow-alt'></i></button>
                        <input type="text" class="url-input" id="url-input" placeholder="Search or type URL" onkeydown="if(event.key==='Enter') navigate()">
                        <button class="nav-btn" onclick="navigate()"><i class='bx bx-search'></i></button>
                        <div class="loader-line" id="loader-line"></div>
                    </div>
                    <div class="web-view" id="frames-container">
                        <div class="processing-overlay" id="proc-overlay">
                            <div class="spinner"></div>
                            <span style="font-size:14px; font-weight:500; letter-spacing:1px;">PROCESSING REQUEST...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS -->
            <div id="page-settings" class="page">
                <div class="settings-wrapper">
                    <div class="settings-box">
                        <h2 style="margin-bottom:20px; display:flex; align-items:center; gap:10px;"><i class='bx bxs-slider'></i> Settings</h2>
                        
                        <div class="setting-group">
                            <label class="setting-label">
                                Auto Updates
                                <label class="switch"><input type="checkbox" id="auto-update-toggle" onchange="VersionManager.toggleAutoUpdate()"><span class="slider"></span></label>
                            </label>
                            <p style="font-size:11px; color:#555;">Automatically check and apply updates on startup.</p>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">Version Reversion</label>
                            <select class="setting-select" id="backup-select">
                                <option value="">Select a previous version...</option>
                            </select>
                            <button class="action-btn" onclick="VersionManager.restoreSelected()"><i class='bx bx-history'></i> Revert to Selected</button>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">Tab Cloaking</label>
                            <select class="setting-select" id="cloak-select" onchange="updateCloak()">
                                <option value="codex">Default (Codex)</option>
                                <option value="canvas">Canvas LMS</option>
                                <option value="classlink">ClassLink</option>
                                <option value="google">Google Drive</option>
                                <option value="clever">Clever</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">
                                Screen Cloak
                                <label class="switch"><input type="checkbox" id="screen-cloak-toggle" onchange="toggleScreenCloak()"><span class="slider"></span></label>
                            </label>
                        </div>

                        <div class="setting-group">
                            <label class="setting-label">Search Engine</label>
                            <select class="setting-select" id="engine-select">
                                <option value="brave">Brave</option>
                                <option value="google">Google</option>
                                <option value="duck">DuckDuckGo</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <button class="action-btn" onclick="openAB()"><i class='bx bx-mask'></i> Launch About:Blank</button>
                            <button class="action-btn" style="background:#222; color:#ff4444; border:1px solid #444; margin-top:10px" onclick="localStorage.clear(); location.reload()"><i class='bx bx-trash'></i> Reset Data</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- VERSION MANAGER (AUTO UPDATE & ROLLBACK) ---
        const VersionManager = {
            currentVer: '3.5',
            repoUrl: 'https://raw.githubusercontent.com/wyvern0us/codexproxy/refs/heads/main/index.html',
            
            init: function() {
                const select = document.getElementById('backup-select');
                let foundBackups = false;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('codex_backup_')) {
                        const opt = document.createElement('option');
                        opt.value = key;
                        opt.text = key.replace('codex_backup_', 'Backup: ');
                        select.appendChild(opt);
                        foundBackups = true;
                    }
                }
                if (!foundBackups) select.innerHTML = '<option>No backups found</option>';

                const autoUpdate = localStorage.getItem('autoUpdate') !== 'false';
                document.getElementById('auto-update-toggle').checked = autoUpdate;
                
                if (autoUpdate) {
                    this.checkForUpdate();
                }
            },

            toggleAutoUpdate: function() {
                const val = document.getElementById('auto-update-toggle').checked;
                localStorage.setItem('autoUpdate', val);
            },

            createBackup: function() {
                const timestamp = new Date().toLocaleString();
                const key = `codex_backup_${timestamp}`;
                let backups = [];
                for(let k in localStorage) if(k.startsWith('codex_backup_')) backups.push(k);
                if (backups.length >= 3) {
                    backups.sort();
                    localStorage.removeItem(backups[0]);
                }
                localStorage.setItem(key, document.documentElement.outerHTML);
            },

            restoreSelected: function() {
                const key = document.getElementById('backup-select').value;
                if (!key || !localStorage.getItem(key)) return alert("Select a valid backup.");
                if (confirm("Revert to this version? This page will reload.")) {
                    const html = localStorage.getItem(key);
                    document.open(); document.write(html); document.close();
                }
            },

            checkForUpdate: async function() {
                try {
                    const response = await fetch(this.repoUrl);
                    if (!response.ok) return;
                    const newHtml = await response.text();
                    
                    if (newHtml.length > 0 && newHtml !== document.documentElement.outerHTML) {
                        this.createBackup();
                        document.open(); document.write(newHtml); document.close();
                    }
                } catch (e) { console.error('Update check failed'); }
            }
        };

        // --- CORE SYSTEM & STATE ---
        const sys = {
            tabs: [],
            activeTab: null,
            screenCloak: localStorage.getItem('screenCloak') === 'true',
            autoAB: localStorage.getItem('autoAB') === 'true',
            games: [
                "Roblox", "Minecraft", "Fortnite", "1v1.lol", "Slope", "Retro Bowl", "BitLife", 
                "Cookie Clicker", "Geometry Dash", "Among Us", "Shell Shockers", "Krunker", 
                "Subway Surfers", "Crossy Road", "Tetris", "2048", "Chess", "Agar.io", 
                "Slither.io", "Paper.io 2", "Hole.io", "Diep.io", "Venge.io", "Smash Karts",
                "Basket Random", "Soccer Random", "Boxing Random", "Volley Random", "Stickman Hook",
                "Tunnel Rush", "Temple Run 2", "Jetpack Joyride", "Fruit Ninja", "Cut the Rope",
                "Doodle Jump", "Flappy Bird", "Bad Ice Cream", "Fireboy & Watergirl", "Moto X3M"
            ]
        };

        // --- INITIALIZATION ---
        window.onload = () => {
            VersionManager.init();
            document.getElementById('screen-cloak-toggle').checked = sys.screenCloak;
        };

        // --- UNLOCK / ERROR PAGE LOGIC ---
        function toggleDetails() {
            const box = document.getElementById('err-details');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        function checkUnlock(e) {
            if(e.key === 'Enter' || e.target.value.toLowerCase() === 'codex') {
                if(e.target.value.toLowerCase().includes('codex')) {
                    unlockApp();
                    e.target.value = '';
                }
            }
        }

        function unlockApp() {
            document.getElementById('fake-error-page').style.display = 'none';
            document.getElementById('app').style.opacity = '1';
            document.getElementById('app').style.pointerEvents = 'auto';
        }

        function lockApp() {
            document.getElementById('app').style.opacity = '0';
            document.getElementById('app').style.pointerEvents = 'none';
            document.getElementById('fake-error-page').style.display = 'flex';
        }

        document.addEventListener('visibilitychange', () => { if(document.hidden && sys.screenCloak) lockApp(); });

        // --- CLOCK & BATTERY ---
        function updateTime() {
            const now = new Date();
            let h = now.getHours(); let m = now.getMinutes();
            h = h % 12; h = h ? h : 12; m = m < 10 ? '0'+m : m;
            document.getElementById('clock-display').innerText = `${h}:${m}`;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000); updateTime();

        // --- NAVIGATION ---
        function setView(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            
            const idx = ['home', 'games', 'browser', 'settings'].indexOf(id);
            if(idx > -1) document.querySelectorAll('.nav-item')[idx].classList.add('active');

            if(id === 'browser' && sys.tabs.length === 0) newTab();
        }

        // --- GAMES ---
        function initGames() {
            const grid = document.getElementById('games-grid');
            for(let i=0; i<250; i++) {
                const name = sys.games[i % sys.games.length] + (i >= sys.games.length ? ` ${Math.floor(i/sys.games.length)+1}` : '');
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerText = name;
                card.onclick = () => {
                    const url = "https://www.easyfun.gg/cloud-games/roblox.html"; // Demo link
                    setView('browser');
                    if(sys.tabs.length === 0) newTab(url);
                    else navigateTo(sys.activeTab, url);
                };
                grid.appendChild(card);
            }
        }
        function filterGames(query) {
            const cards = document.querySelectorAll('.game-card');
            cards.forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(query.toLowerCase()) ? 'block' : 'none';
            });
        }
        initGames();

        // --- BROWSER SYSTEM WITH START PAGE ---
        function getStartPageHTML() {
            return `<!DOCTYPE html><html><head><link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'><style>body{background:#0a0a0a;color:white;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0}.logo{font-size:48px;font-weight:800;margin-bottom:30px;letter-spacing:-2px}.search-box{background:#1a1a1a;padding:15px 20px;border-radius:30px;border:1px solid #333;width:500px;display:flex;align-items:center;gap:10px;transition:0.2s}.search-box:hover{border-color:#666}.search-box input{background:transparent;border:none;color:white;flex:1;outline:none;font-size:16px}.shortcuts{display:flex;gap:20px;margin-top:40px}.shortcut{width:80px;height:80px;background:#1a1a1a;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;border:1px solid #333}.shortcut:hover{background:#222;transform:translateY(-5px)}.shortcut i{font-size:32px;color:#fff}</style></head><body><div class="logo">Codex</div><div class="search-box"><i class='bx bx-search' style="font-size: 20px; color: #888;"></i><input type="text" placeholder="Search the web..." onkeydown="if(event.key==='Enter') window.parent.postMessage({action:'navigate', url:this.value}, '*')"></div><div class="shortcuts"><div class="shortcut" onclick="window.parent.postMessage({action:'navigate', url:'google.com'}, '*')"><i class='bx bxl-google'></i></div><div class="shortcut" onclick="window.parent.postMessage({action:'navigate', url:'youtube.com'}, '*')"><i class='bx bxl-youtube'></i></div><div class="shortcut" onclick="window.parent.postMessage({action:'navigate', url:'discord.com'}, '*')"><i class='bx bxl-discord-alt'></i></div><div class="shortcut" onclick="window.parent.postMessage({action:'navigate', url:'reddit.com'}, '*')"><i class='bx bxl-reddit'></i></div></div></body></html>`;
        }

        window.addEventListener('message', (e) => {
            if(e.data.action === 'navigate') {
                document.getElementById('url-input').value = e.data.url;
                navigate();
            }
        });

        function newTab(url = '') {
            const id = Date.now();
            const tab = { id, url: url || 'start', title: 'New Tab' };
            sys.tabs.push(tab);

            const tabEl = document.createElement('div');
            tabEl.className = 'tab'; tabEl.id = `tab-${id}`;
            tabEl.innerHTML = `<i class='bx bx-globe'></i> <span onclick="activateTab(${id})">New Tab</span> <div class="tab-close" onclick="closeTab(${id})"><i class='bx bx-x'></i></div>`;
            document.getElementById('tabs-container').insertBefore(tabEl, document.querySelector('.new-tab'));

            const frame = document.createElement('iframe');
            frame.className = 'frame'; frame.id = `frame-${id}`;
            document.getElementById('frames-container').appendChild(frame);

            activateTab(id);
            if(url) navigateTo(id, url);
            else loadStartPage(id);
        }

        function loadStartPage(id) {
            const frame = document.getElementById(`frame-${id}`);
            const blob = new Blob([getStartPageHTML()], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);
            document.getElementById('url-input').value = '';
        }

        function closeTab(id) {
            sys.tabs = sys.tabs.filter(t => t.id !== id);
            document.getElementById(`tab-${id}`).remove();
            document.getElementById(`frame-${id}`).remove();
            
            if(sys.activeTab === id) {
                if(sys.tabs.length > 0) activateTab(sys.tabs[sys.tabs.length - 1].id);
                else sys.activeTab = null;
            }
        }

        function activateTab(id) {
            sys.activeTab = id;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`frame-${id}`).classList.add('active');
            const currentUrl = sys.tabs.find(t => t.id === id).url;
            document.getElementById('url-input').value = currentUrl === 'start' ? '' : currentUrl;
        }

        async function navigate() {
            if(!sys.activeTab) return;
            const input = document.getElementById('url-input').value.trim();
            if(!input) return;
            await navigateTo(sys.activeTab, input);
        }

        async function navigateTo(id, input) {
            const engine = document.getElementById('engine-select').value;
            let url = input;
            
            const loader = document.getElementById('loader-line');
            const overlay = document.getElementById('proc-overlay');
            loader.className = 'loader-line loading';
            overlay.classList.add('active');

            if(!input.includes('.') || input.includes(' ')) {
                const engines = {
                    brave: "https://search.brave.com/search?q=",
                    google: "https://www.google.com/search?q=",
                    duck: "https://duckduckgo.com/?q="
                };
                url = engines[engine] + encodeURIComponent(input);
            } else if (!input.startsWith('http')) {
                url = 'https://' + input;
            }

            const tab = sys.tabs.find(t => t.id === id);
            tab.url = url;
            
            const tabTitle = document.querySelector(`#tab-${id} span`);
            tabTitle.innerText = input.substring(0, 12) + (input.length > 12 ? '...' : '');
            document.getElementById('url-input').value = url;

            const frame = document.getElementById(`frame-${id}`);

            try {
                if(url.includes('xbox.com') || url.includes('now.gg')) {
                     frame.src = url;
                } else {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    if(!response.ok) throw new Error();
                    const data = await response.json();
                    let html = data.contents;
                    html = html.replace('<head>', `<head><base href="${url}">`);
                    const blob = new Blob([html], {type: 'text/html'});
                    frame.src = URL.createObjectURL(blob);
                }
            } catch(e) {
                frame.src = url;
            }

            setTimeout(() => {
                loader.className = 'loader-line finished';
                overlay.classList.remove('active');
            }, 800);
        }

        function navBack() { if(sys.activeTab) document.getElementById(`frame-${sys.activeTab}`).contentWindow.history.back(); }
        function navForward() { if(sys.activeTab) document.getElementById(`frame-${sys.activeTab}`).contentWindow.history.forward(); }
        function navReload() { 
            if(sys.activeTab) {
                const tab = sys.tabs.find(t => t.id === sys.activeTab);
                if(tab.url === 'start') loadStartPage(sys.activeTab);
                else navigateTo(sys.activeTab, tab.url);
            }
        }

        // --- SETTINGS ---
        const cloaks = {
            codex: { t: "Error", i: "" },
            canvas: { t: "Dashboard", i: "https://du11hjcvx0uqb.cloudfront.net/br/dist/images/favicon-e10d657a73.ico" },
            classlink: { t: "My Apps", i: "https://cdn.classlink.com/production/launchpad/resources/images/favicon.ico" },
            google: { t: "My Drive - Google Drive", i: "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" },
            clever: { t: "Clever | Portal", i: "https://assets.clever.com/favicons/favicon.ico" }
        };

        function updateCloak() {
            const val = document.getElementById('cloak-select').value;
            const data = cloaks[val];
            document.title = data.t;
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.getElementsByTagName('head')[0].appendChild(link);
            }
            link.href = data.i;
        }

        function toggleScreenCloak() {
            sys.screenCloak = document.getElementById('screen-cloak-toggle').checked;
            localStorage.setItem('screenCloak', sys.screenCloak);
        }

        function openAB() {
            let win = window.open('about:blank');
            win.document.write(`<!DOCTYPE html><html><body style="margin:0"><iframe src="${location.href}" style="width:100vw;height:100vh;border:none"></iframe></body></html>`);
            win.document.close();
        }

    </script>
</body>
</html>
